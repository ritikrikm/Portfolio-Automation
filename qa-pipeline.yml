name: QA Automation Pipeline on:
  repository_dispatch:
    types:
      - run-qa-tests
  workflow_dispatch:
    inputs:
      env:
        description: "Environment" required: true default: "qa" type: choice options:
          - dev - qa - uat - prod
      test_suite:
        description: "Test Suite" required: true default: "smoke" type: choice options:
          - smoke - sanity - regression jobs:
  qa-tests:
    runs-on: ubuntu-latest steps:
      - name: Checkout QA Automation Code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4 with:
          distribution: temurin java-version: 17
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run QA Tests
        run: |
          TEST_SUITE="${{ github.event.client_payload.test_suite || github.event.inputs.test_suite || 'smoke' }}" ENV_NAME="${{ github.event.client_payload.env 
          || github.event.inputs.env || 'qa' }}" echo "Running $TEST_SUITE tests on $ENV_NAME" mvn clean test \
            -Dgroups=$TEST_SUITE \ -Denv=$ENV_NAME \ -Dbrowser=chrome \ -Dheadless=true
      - name: Upload Surefire Reports
        if: always() uses: actions/upload-artifact@v4 with:
          name: surefire-reports path: target/surefire-reports/
      - name: Upload Extent Report
        if: always() uses: actions/upload-artifact@v4 with:
          name: extent-report
          path: test-output/
