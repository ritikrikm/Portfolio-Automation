name: QA Automation Pipeline on:
  repository_dispatch:
    types:
      - run-qa-tests
  workflow_dispatch:
    inputs:
      env:
        description: "Environment" required: true default: "qa" type: choice options:
          - dev - qa - uat - prod
      test_suite:
        description: "Test Suite" required: true default: "smoke" type: choice options:
          - smoke - sanity - regression jobs:
  qa-tests:
    runs-on: ubuntu-latest steps:
      - name: Checkout QA Automation Code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4 with:
          distribution: temurin java-version: 17
      - name: Run QA Tests
        run: |
          mvn test \ -Dgroups=${{ github.event.client_payload.test_suite || github.event.inputs.test_suite || 'smoke' }} \ -Denv=${{ 
          github.event.client_payload.env || github.event.inputs.env || 'qa' }} \ -Dbrowser=chrome \ -Dheadless=true
      - name: Upload QA Report
        if: always() uses: actions/upload-artifact@v4 with:
          name: qa-test-report path: |
            test-output/
            target/surefire-reports/
